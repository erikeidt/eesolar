
input_boolean:
  ee_solar_is_tou_workday:
    name: "EE Solar is TOU Workday"
    initial: off
  ee_solar_is_tou_workday_tomorrow:
    name: "EE Solar is TOU Workday Tomorrow"
    initial: off
  ee_solar_is_summer_season:
    name: "EE Solar is Summer Season"
    initial: off
  ee_solar_is_summer_season_tomorrow:
    name: "EE Solar is Summer Season Tomorrow"
    initial: off

input_number:
  ee_observed_battery_flow:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Battery Flow"
    initial: 0
  ee_observed_solar_production:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Solar Production"
    initial: 0
  ee_observed_solar_production_max:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Solar Production Max"
  ee_observed_net_consumption:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Net Consumption"
    initial: 0
  ee_observed_home_load:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Home Load"
    initial: 0
  ee_observed_total_consumption:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Total Consumption"
    initial: 0
  ee_observed_charge:
    min: 0.0
    max: 200.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "%"
    name: "Charge %"
    initial: 0
  ee_observed_tariff_battery_reserve:
    min: 0.0
    max: 200.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "%"
    name: "Battery Reserve %"
    initial: 0
  ee_observed_envoy_read_battery_latency:
    min: 0.0
    max: 1000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "ms"
    name: "Battery Latency"
    initial: 0
  ee_observed_envoy_read_livedata_latency:
    min: 0.0
    max: 1000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "ms"
    name: "Livedata Latency"
    initial: 0
  ee_hour_of_day:
    min: 0
    max: 24
    mode: "box"
    step: 1.0
    name: "Hour of Day"
    initial: 0
  ee_solar_generation_forecast_just_clouds:
    min: -1000000
    max:  10000000.0
    mode: "box"
    step: 1000
    name: Solar Generation Forecast just Clouds
    unit_of_measurement: "Wh"
    initial: 0
  ee_solar_generation_forecast:
    min: -1000000
    max:  10000000.0
    mode: "box"
    step: 1000
    name: Solar Generation Forecast
    unit_of_measurement: "Wh"
    initial: 0
  ee_solar_state_controller_counter:
    min: 0
    max: 100
    name: Controller State Counter
  ee_observed_solar_whrs_predicted_max:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "Wh"
    name: "Solar Whrs Predicted Max"
    
input_text:
  ee_observed_tariff:
    max: 16
    name: "Observed Tariff"
    initial: "??"
  ee_observed_tariff_schedule:
    max: 255
    name: "Observed Tariff Schedule"
    initial: "??"
  ee_observed_batteries:
    max: 255
    name: "Observed Batteries"
    initial: "??"
  ee_observed_vers:
    max: 16 
    name: "Observed Vers"
    initial: "??"
  ee_observed_grid_status:
    max: 16 
    name: "Observed Grid Status"
    initial: "??"
  solar_array_info:
    name: "Solar Array Info"
    max: 255
    initial: '[ { "e": 26, "a": 180, "r": 6660, "c": -0.38, "x": 5310, "b": 20.16, "h": 1100, "y": 2021, "d": -0.3 } ]'
  ee_solar_envoy_tariff_name:
    max: 255
    name: "Tariff Name"
  ee_solar_envoy_tariff_time:
    max: 255
    name: "Tariff Time"
  ee_solar_envoy_tariff_parameters:
    max: 255
    name: "Tariff Params"
  ee_solar_observed_tariff_time:
    max: 255
    name: "Observed Tariff Time"

input_datetime:
  ee_envoy_pc_reporting_time:
    has_time: true
    has_date: false
    name: "PC Reporting Time"
    initial: 00:00
  ee_envoy_battery_reporting_time:
    has_time: true
    has_date: false
    name: "Battery Reporting Time"
    initial: 00:00

rest_command:
  read_envoy_xml_info:
#   url: "https://envoy.local/info.xml"
    url: "https://192.168.68.102/info.xml"
    method: get
    verify_ssl: false
    timeout: 400 
    headers:
      Authorization: !secret enjt
      Accept: "application/xml"
  read_envoy_relay:
#   url: "https://envoy.local/ivp/ensemble/relay"
    url: "https://192.168.68.102/ivp/ensemble/relay"
    method: get
    verify_ssl: false
    timeout: 400 
    headers:
      Authorization: !secret enjt
  read_enovy_basic:
#   url: "https://envoy.local/production.json"
    url: "https://192.168.68.102/production.json"
    method: get
    verify_ssl: false
    timeout: 400
    headers:
      Authorization: !secret enjt
  read_envoy_batteries:
#   url: "https://envoy.local/ivp/ensemble/power"
    url: "https://192.168.68.102/ivp/ensemble/power"
    method: get
    verify_ssl: false
    timeout: 400
    headers:
      Authorization: !secret enjt
  envoy_enable_livedata_stream:
#   url: "https://envoy.local/ivp/livedata/stream"
    url: "https://192.168.68.102/ivp/livedata/stream"
    method: post 
    verify_ssl: false
    timeout: 400
    headers:
      Authorization: !secret enjt
    payload: '{"enable":1}'
  envoy_disable_livedata_stream:
#   url: "https://envoy.local/ivp/livedata/stream"
    url: "https://192.168.68.102/ivp/livedata/stream"
    method: post 
    verify_ssl: false
    timeout: 400
    headers:
      Authorization: !secret enjt
    payload: '{"enable":0}'
  read_envoy_livedata_status:
#   url: "https://envoy.local/ivp/livedata/status"
    url: "https://192.168.68.102/ivp/livedata/status"
    method: get
    verify_ssl: false
    timeout: 400
    headers:
      Authorization: !secret enjt
  read_envoy_stream:
#   url: "https://envoy.local/stream/meter"
    url: "https://192.168.68.102/stream/meter"
    method: get
    verify_ssl: false
    timeout: 6 
    headers:
      Authorization: !secret enjt
  read_envoy_tariff:
#   url: "https://envoy.local/admin/lib/tariff.json"
    url: "https://192.168.68.102/admin/lib/tariff.json"
    method: get
    verify_ssl: false
    timeout: 400 
    headers:
      Authorization: !secret enjt
  send_envoy_param_tariff:
#   url: "https://envoy.local/admin/lib/tariff.json"
    url: "https://192.168.68.102/admin/lib/tariff.json"
#   url: "https://echo.free.beeceptor.com/"
    method: post
    verify_ssl: false
    timeout: 400 
    content_type: "application/json"
    headers:
      Authorization: !secret enjt
    payload: >-
      {{
        '{"tariff":{"currency":{"code":"USD"},"logger":"mylogger","date":"' +
        time | string +
        '","storage_settings":{"mode":"economy","operation_mode_sub_type":"","reserved_soc":' +
        reserve | round(1) | string +
        ',"very_low_soc":25,"charge_from_grid":' +
        ('false' | string if gridcharge is undefined or not gridcharge else 'true' | string) | string  +
        ',"date":"' +
        time | string +
        '","opt_schedules":false},"single_rate":{"rate":0.25,"sell":0.25},' +
        '"seasons":[{"id":"all_year_long","start":"1/1",' +
        '"days":[{"id":"all_days","days":"Mon,Tue,Wed,Thu,Fri,Sat,Sun",' +
        '"must_charge_start":0,"must_charge_duration":0,"must_charge_mode":"CP","peak_rule":"' +
        peak_rule +
        '","enable_discharge_to_grid":false,"periods":[{"id":"filler","start":0,"rate":0.25},{"id":"peak-1_","start":' +
        peak_start | int | string +
        ',"rate":0.5},{"id":"filler","start":' +
        peak_end | int | string +
        ',"rate":0.25}' + 
        ('' | string if second_start is undefined or second_end is undefined else
          (',{"id":"peak-2_","start":' + second_start | int | string + ',"rate":0.5},{"id":"filler","start":' + second_end | int | string + ',"rate":0.25}')
        ) | string + 
        ']}]}]}}'
      }}


template:
  - sensor:
    - name: "EE Envoy Observed Large"
      unique_id: "ee_envoy_observed_large"
      state: "on"
      attributes:
        pl: "{{ states('input_number.ee_observed_envoy_read_livedata_latency') }}"
        sp: "{{ states('input_number.ee_observed_solar_production') | float(0) }}"
        sm: "{{ states('sensor.ee_calculated_solar_output') | float(0) }}"
        hl: "{{ states('input_number.ee_observed_home_load') | float(0) }}"
        tc: "{{ states('input_number.ee_observed_total_consumption') | float(0) }}"
        nc: "{{ states('input_number.ee_observed_net_consumption') | float(0) }}"
        bl: "{{ states('input_number.ee_observed_envoy_read_battery_latency') }}"
        bf: "{{ states('input_number.ee_observed_battery_flow') | float(0) }}"
        bc: "{{ states('input_number.ee_observed_charge') | float(0) | round(2) }}"
        ba: "{{ states('input_text.ee_observed_batteries') }}"
        sc: "{{ states('input_text.ee_observed_tariff_schedule') }}"
        gs: "{{ states('input_text.ee_observed_grid_status') }}"
        vs: "{{ states('input_text.ee_observed_vers') }}"
        e1: "{{ states('input_number.ee_solar_generation_forecast_just_clouds') }}"
        e2: "{{ states('input_number.ee_solar_generation_forecast') }}"
        bn: "{{ states('sensor.ee_envoy_battery_charge_needed') | float(0) | round(0) }}"
    - name: "EE Solar Obs vs Calc Pct"
      unique_id: "ee_solar_obs_vs_calc_pct"
      unit_of_measurement: "%"
      state_class: measurement
      state: |-
        {% set cso = states('sensor.ee_calculated_solar_output') | float(0) -%}
        {{
          0 if cso == 0 else
          ( (states('input_number.ee_observed_solar_production') | float(0) / cso) * 100 )
          | round(2)
        }}
    - name: "EE Envoy Battery Charge Needed"
      unique_id: "ee_envoy_battery_charge_needed"
      unit_of_measurement: "Wh"
      state_class: measurement
      device_class: energy_storage
      state: "{{ (1-states('input_number.ee_observed_charge')|float/100) * (20.16 * 1000)}}"
      attributes:
        friendly_name: "Charge Needed"
    - name: "EE Calculated Solar Output"
      unique_id: "ee_calculated_solar_output"
      unit_of_measurement: mW
      device_class: power
      state_class: measurement
      state: |-
        {# Solar Formula -#}
        {# https://pubs.nmsu.edu/_circulars/CR674/index.html -#}
        {# https://pubs.nmsu.edu/_circulars/CR674/CR674.xlsm -#}
        {% set latitude_degrees = state_attr('zone.home', 'latitude') -%}
        {% set longitude_degrees = state_attr('zone.home', 'longitude') -%}
        {% set latitude_radians = latitude_degrees * (pi/180) -%}
        {# {% set longitude_radians = longitude_degrees * (pi/180) -%} -#}
        {% set solar_array_info = states('input_text.solar_array_info') | from_json -%}
        {% set panel_info = solar_array_info[0] -%}
        {% set panel_elevation_radians = panel_info.e * (pi/180) -%}
        {% set panel_azimuth_radians = panel_info.a * (pi/180) -%}
        {% set time_now = now () | as_local -%}
        {% set time_tuple = time_now.timetuple() -%}
        {% set jdoy = time_tuple.tm_yday -%}
        {% set longitude_correction_radians = ((360/364)*(jdoy-81)) * (pi/180) -%}
        {% set declination_radians = 23.45 * sin( (360/365.25) * (jdoy - 81) * (pi/180) ) * (pi/180) -%}
        {% set watts = panel_info.r * (1 + panel_info.d/100) ** (time_tuple.tm_year - panel_info.y) -%}
        {% set local_meridan = ((time_now | as_datetime | as_local).strftime("%z") | int / 100) | int * 15 -%}
        {% set equation_of_time =
          (9.87*sin(2*longitude_correction_radians)) - 
          (7.53*cos(longitude_correction_radians)) - 
          (1.5*sin(longitude_correction_radians))
        -%}
        {% set local_noon = 
          ((12*60) - 4 * (longitude_degrees - local_meridan) - equation_of_time)/60 - time_tuple.tm_isdst 
        -%}
        {% set sky_factor100 = sin((360/365)*(jdoy-100)*(pi/180)) -%}
        {% set sky_factor275 = sin((360/365)*(jdoy-275)*(pi/180)) -%}
        {% set apparent_et_irradiance = 1160+75*sky_factor275 -%}
        {% set optical_depth = 0.174+0.035*sky_factor100 -%}
        {% set sky_diffuse_factor = 0.095+0.04*sky_factor100 -%}
        {% set time_decimal = time_now.strftime("%H") | int + time_now.strftime("%M") | int / 60 -%}
        {% set noon_to_now = local_noon - time_decimal -%}
        {% set hour_angle_radians = noon_to_now * 15 * (pi/180) -%}
        {% set solar_elevation_radians = 
          asin(
            cos(latitude_radians) * cos(declination_radians) * cos(hour_angle_radians)  +
            sin(latitude_radians) * sin(declination_radians)
          )
        -%}
        {% set solar_azimuth0 =
          asin(
            ( sin(hour_angle_radians) * cos(declination_radians) )  /
            cos(solar_elevation_radians)
          )
        -%}
        {% set solar_azimuth_radians = pi - solar_azimuth0 -%}
        {% set aoi_wo_cos = 
          sin(solar_elevation_radians) * cos(panel_elevation_radians) +
          cos(solar_elevation_radians) * sin(panel_elevation_radians) * cos(panel_azimuth_radians - solar_azimuth_radians)
        -%}
        {% set air_mass_ratio = (1/sin(solar_elevation_radians)) | abs -%}
        {% set air_density_factor = e**(-optical_depth * air_mass_ratio) -%}
        {# set air_density_factor_stc = e**(-optical_depth * 1.5) -#}
        {% set cs_beam_radiation_curr = 
          apparent_et_irradiance * air_density_factor
            if solar_elevation_radians > 0
            else 0
        -%}
        {% set beam_on_panel_dni = cs_beam_radiation_curr * aoi_wo_cos -%}
        {% set diffuse_on_panel_dhi = sky_diffuse_factor * cs_beam_radiation_curr * ((1+cos(panel_elevation_radians))/2) -%}
        {% set irradiance_on_panel_ghi = beam_on_panel_dni + diffuse_on_panel_dhi -%}
        {% set air_temp_f = states('sensor.pa_air_temp') | float(77) -%}
        {% set air_temp_c = (air_temp_f - 32) * 5 / 9 -%}
        {% set panel_temp_c = air_temp_c + 15 -%}
        {% set temp_factor = 1 if panel_temp_c <= 35 else 1+(panel_info.c*(panel_temp_c-25))/100 -%}
        {% set aqi = states('sensor.pa_air_quality') | float(50) %}
        {% set aqi_factor = (1-(aqi / (400/0.12))) -%}
        {% set irradiance = irradiance_on_panel_ghi * watts * temp_factor * aqi_factor -%} 
        {{ irradiance | round(0) }}

