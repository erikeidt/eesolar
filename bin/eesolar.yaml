automation:
- alias: EE Read Envoy Battery
  id: ee_read_envoy_battery
  description: ''
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: template
    value_template: '{{ states(this .entity_id) == "on" }}'
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions: []
  actions:
  - repeat:
      sequence:
      - variables:
          request_time: '{{ now() }}'
          response:
            status: timeout
      - action: rest_command.read_envoy_batteries
        continue_on_error: true
        metadata: {}
        data: {}
        response_variable: response
      - variables:
          response_time: '{{ now() }}'
          just_now: '{{ (response_time | as_datetime).strftime(''%H:%M:%S'') }}'
          latency: '{{ ((response_time | as_timestamp - request_time | as_timestamp) * 1000) | int }}'
      - action: notify.persistent_notification
        metadata: {}
        data:
          message: '{{ response }}'
        enabled: false
      - if:
        - condition: template
          value_template: |-
            {{
              response is not defined or response.status == 'timeout' or
              response.status | int(0) != 200
            }}
        then:
        - action: notify.persistent_notification
          metadata: {}
          data:
            message: '{{ now().strftime("%m/%d %H:%M:%S") }} -- Battery -- {{ response.status | default(response) }} -- {{ latency }} ms'
        - stop: Rest command failure
          error: true
          enabled: false
        - delay:
            hours: 0
            minutes: 4
            seconds: 0
            milliseconds: 0
        else:
        - variables:
            newline: '

              '
            content: '{{ response.content | replace(newline, '' '') }}'
            devices: '{{ content[''devices:''] }}'
            pwr_soc: |-
              {% set ns = namespace(pwr=0,soc=0,batts=[]) %}
              {% for d in devices %}
                {% set ns.pwr = ns.pwr + d.real_power_mw %}
                {% set ns.soc = ns.soc + d.soc %}
                {% set ns.batts = ns.batts + [d.soc] %}
                {% set ns.batts = ns.batts + [(-d.real_power_mw)] %}
              {% endfor %}
              {{
                { 
                  "pwr": ns.pwr,
                  "soc": ns.soc,
                  "num": devices | count,
                  "batts": ns.batts
                }
              }}
            flow: '{{ -pwr_soc.pwr }}'
            soc: '{{ pwr_soc.soc }}'
            socpct: '{{ soc / pwr_soc.num }}'
            batts: '{{ pwr_soc.batts }}'
        - action: input_number.set_value
          metadata: {}
          data:
            value: '{{ socpct | round(2) }}'
          target:
            entity_id: input_number.ee_observed_charge
        - action: input_text.set_value
          metadata: {}
          data:
            value: '{{ batts }}'
          target:
            entity_id: input_text.ee_observed_batteries
        - action: input_datetime.set_datetime
          metadata: {}
          data:
            time: '{{ just_now }}'
          target:
            entity_id: input_datetime.ee_envoy_battery_reporting_time
        - action: input_number.set_value
          metadata: {}
          data:
            value: '{{ latency }}'
          target:
            entity_id: input_number.ee_observed_envoy_read_battery_latency
        - delay:
            milliseconds: "{{ 1030 if latency < 55 else 1030 + (latency-55) * 2.5 if latency < 1600 else 15000 if latency < 8000 else 45000 }}" 
      count: 60
  - action: automation.turn_off
    metadata: {}
    data:
      stop_actions: false
    target:
      entity_id: '{{ this.entity_id }}'
  - action: automation.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: '{{ this.entity_id }}'
  mode: single
- alias: EE Read Envoy Livedata
  id: ee_read_envoy_livedata
  description: ''
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: template
    value_template: '{{ states(this.entity_id ) == "on" }}'
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions: []
  actions:
  - repeat:
      sequence:
      - variables:
          request_time: '{{ now() }}'
          response:
            status: timeout
      - action: rest_command.read_envoy_livedata_status
        continue_on_error: true
        metadata: {}
        data: {}
        response_variable: response
      - variables:
          response_time: '{{ now() }}'
          just_now: '{{ (response_time | as_datetime).strftime("%H:%M:%S") }}'
          latency: '{{ ((response_time | as_timestamp - request_time | as_timestamp) * 1000) | int }}' 
      - action: notify.persistent_notification
        metadata: {}
        data:
          message: '{{ response }}'
        enabled: false
      - if:
        - condition: template
          value_template: |-
            {{
              response is not defined or response.status == 'timeout' or
              response.status | int(0) != 200
            }}
        then:
        - action: notify.persistent_notification
          metadata: {}
          data:
            message: '{{ now().strftime("%m/%d %H:%M:%S") }} -- Livedata -- {{ response.status | default(response) }} -- {{ latency }} ms'
        - stop: Rest command failed
          error: true
          enabled: false
        - delay:
            hours: 0
            minutes: 4
            seconds: 0
            milliseconds: 0
        else:
        - variables:
            content: '{{ response.content }}'
            connection: '{{ content.connection }}'
            sc_stream: '{{ connection.sc_stream }}'
        - if:
          - condition: template
            value_template: "{{ sc_stream != 'enabled' }}"
          then:
          - action: rest_command.envoy_enable_livedata_stream
            metadata: {}
            data: {}
            response_variable: response
          - action: notify.persistent_notification
            metadata: {}
            data:
              message: |-
                {{ now().strftime("%m/%d %H:%M:%S") }}
                Enabling Stream 
          - delay:
              hours: 0
              minutes: 0
              seconds: 30
              milliseconds: 0
          else:
          - variables:
              meters: '{{ content.meters }}'
              last_update: '{{ meters.last_update }}'
              solar_production: '{{ meters.pv.agg_p_mw }}'
              net_consumption: '{{ meters.grid.agg_p_mw }}'
              battery_flow: '{{ - meters.storage.agg_p_mw }}'
              home_load: '{{ meters.load.agg_p_mw }}'
              total_consumption: '{{ home_load + battery_flow }}'
          - action: input_number.set_value
            metadata: {}
            data:
              value: '{{ battery_flow }}'
            target:
              entity_id: input_number.ee_observed_battery_flow
            enabled: true
          - action: input_number.set_value
            metadata: {}
            data:
              value: '{{ solar_production }}'
            target:
              entity_id: input_number.ee_observed_solar_production
          - if:
            - condition: template
              value_template: "{{ solar_production | float > states('input_number.ee_observed_solar_production_max') | float }}"
            then:
            - action: input_number.set_value
              metadata: {}
              data:
                value: '{{ solar_production }}'
              entity_id: input_number.ee_observed_solar_production_max
          - action: input_number.set_value
            metadata: {}
            data:
              value: '{{ net_consumption }}'
            target:
              entity_id: input_number.ee_observed_net_consumption
          - action: input_number.set_value
            metadata: {}
            data:
              value: '{{ total_consumption }}'
            target:
              entity_id: input_number.ee_observed_total_consumption
          - action: input_number.set_value
            metadata: {}
            data:
              value: '{{ home_load }}'
            target:
              entity_id: input_number.ee_observed_home_load
          - action: input_datetime.set_datetime
            metadata: {}
            data:
              time: '{{ just_now }}'
            target:
              entity_id: input_datetime.ee_envoy_pc_reporting_time
          - action: input_number.set_value
            metadata: {}
            data:
              value: '{{ latency }}'
            target:
              entity_id: input_number.ee_observed_envoy_read_livedata_latency
          - action: notify.persistent_notification
            metadata: {}
            data:
              message: '{{ last_update | as_datetime  }}'
            enabled: false
          - delay:
              milliseconds: "{{ 1030 if latency < 55 else 1030 + (latency-55) * 2.5 if latency < 1600 else 15000 if latency < 8000 else 45000 }}"
      count: 60
  - action: automation.turn_off
    metadata: {}
    data:
      stop_actions: false
    target:
      entity_id: '{{ this.entity_id }}'
  - action: automation.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: '{{ this.entity_id }}'
  mode: single
- alias: EE Read Envoy Relay
  id: ee_read_envoy_relay
  description: ''
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions: []
  actions:
  - action: rest_command.read_envoy_relay
    metadata: {}
    data: {}
    response_variable: envoy_ivp_ensemble_relay
  - variables:
      content: '{{ envoy_ivp_ensemble_relay.content }}'
      grid: '{{ content.mains_oper_state }}'
  - action: input_text.set_value
    metadata: {}
    data:
      value: '{{ grid }}'
    target:
      entity_id: input_text.ee_observed_grid_status
  mode: single
- alias: EE Read Envoy Tariff
  id: ee_read_envoy_tariff
  description: ''
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions: []
  actions:
  - action: rest_command.read_envoy_tariff
    metadata: {}
    data: {}
    response_variable: response
  - action: script.ee_decode_tariff
    metadata: {}
    data:
      response: '{{ response }}'
  mode: single
- alias: EE Read Envoy XML Info
  id: ee_read_envoy_xml_info
  description: ''
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: template
    value_template: '{{ states( this.entity_id) == "on" }}'
    for:
      hours: 0
      minutes: 0
      seconds: 15 
  - trigger: time_pattern
    hours: /12
  conditions: []
  actions:
  - action: rest_command.read_envoy_relay
    metadata: {}
    data: {}
    response_variable: envoy_ivp_ensemble_relay
    enabled: false
  - variables:
      content: '{{ envoy_ivp_ensemble_relay.content }}'
      grid: '{{ content.mains_oper_state == "closed" }}'
    enabled: false
  - action: rest_command.read_envoy_xml_info
    metadata: {}
    data: {}
    response_variable: envoy_info_xml
  - variables:
      xml_text: '{{ envoy_info_xml.content }}'
      time_tag: '{{ xml_text | regex_findall_index("<time>.*</time>") }}'
      time: '{{ time_tag[6:-7] }}'
      software_tag: '{{ xml_text | regex_findall_index("<software>.*</software>")
        }}'
      vers: '{{ software_tag[10:-11] }}'
    enabled: false
  - variables:
      xml_text: '{{ envoy_info_xml.content }}'
      software_tag: '{{ xml_text | regex_findall_index("<software>.*</software>")
        }}'
      vers: '{{ software_tag[10:-11] }}'
  - action: input_text.set_value
    metadata: {}
    data:
      value: '{{ vers }}'
    target:
      entity_id: input_text.ee_observed_vers
  mode: single
- alias: EE Solar Envoy Break Time
  id: ee_solar_envoy_break_time
  description: "Turn off monitoring to allow Envoy a cleanup break"
  triggers:
    - trigger: time
      at: "23:45:00"
    - trigger: time
      at: "00:46:00"
    - trigger: state
      entity_id:
        - input_boolean.ee_utilities_booted
      to:
        - "on"
  conditions: []
  actions:
    - if:
        - condition: template
          value_template: >-
            {{ trigger is undefined or trigger.idx is undefined or trigger.idx |
            int == 0 }}
      then:
        - action: automation.turn_off
          metadata: {}
          target:
            entity_id:
              - automation.ee_read_envoy_battery
              - automation.ee_read_envoy_livedata
              - automation.ee_read_envoy_tariff
              - automation.ee_read_envoy_relay
              - automation.ee_read_envoy_xml_info
          data:
            stop_actions: true
        - action: rest_command.envoy_disable_livedata_stream
          metadata: {}
          data: {}
          response_variable: response
      else:
        - action: automation.turn_on
          metadata: {}
          target:
            entity_id:
              - automation.ee_read_envoy_battery
              - automation.ee_read_envoy_livedata
              - automation.ee_read_envoy_tariff
              - automation.ee_read_envoy_relay
              - automation.ee_read_envoy_xml_info
  mode: single
- alias: EE Forecast Solar Generation
  id: ee_forecast_solar_generation
  description: "Predict Whrs of solar for the rest of the day"
  triggers:
    - trigger: time_pattern
      minutes: /1
  conditions:
    - condition: time
      after: "07:00:00"
    - condition: time
      before: "17:00:05"
  actions:
    - if:
        - condition: template
          value_template: "{{ states('input_number.ee_hour_of_day') | int(0) < 17 }}"
      then:
        - action: script.ee_forecast_solar_production
          metadata: {}
          data: {}
          response_variable: forecast
      else:
        - variables:
            forecast:
              whrs_with_clouds_no_load: 0
              whrs_with_clouds_small_load: 0
    - variables:
        whrs_with_clouds_no_load: "{{ max(forecast.whrs_with_clouds_no_load,0) }}"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ee_solar_generation_forecast_just_clouds
      data:
        value: "{{ whrs_with_clouds_no_load }}"
    - action: input_number.set_value
      metadata: {}
      target:
        entity_id: input_number.ee_solar_generation_forecast
      data:
        value: "{{ max(forecast.whrs_with_clouds_small_load,0) }}"
    - if:
      - condition: template
        value_template: "{{ whrs_with_clouds_no_load > states('input_number.ee_observed_solar_whrs_predicted_max') | int(0) }}"
      then: 
      - action: input_number.set_value
        metadata: {}
        target:
          entity_id: input_number.ee_observed_solar_whrs_predicted_max
        data:
          value: "{{ whrs_with_clouds_no_load }}"
  mode: single

- alias: EE Solar Load New Tariff
  id: ee_solar_load_new_tariff
  description: "Load Tariff into Envoy, if it isn't the one we want"
  triggers:
    - trigger: template
      value_template: |-
        {{ 
          states('input_text.ee_solar_envoy_tariff_time') !=
              states('input_text.ee_solar_observed_tariff_time')
            and
          states('input_boolean.ee_utilities_booted') == 'on'
        }}
      for:
        seconds: 4
  conditions: []
  actions:
    - action: rest_command.send_envoy_param_tariff
      continue_on_error: true
      metadata: {}
      data: "{{ states('input_text.ee_solar_envoy_tariff_parameters') }}"
      response_variable: response
    - action: script.ee_decode_tariff
      metadata: {}
      data:
        response: "{{ response }}"
    - delay:
        minutes: 1
  mode: single

- alias: EE Set Hour of Day
  id: ee_set_hour_of_day
  description: "Time trigger to use instead of now(); fires every hour"
  triggers:
    - trigger: time_pattern
      hours: /1
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: input_number.set_value
      metadata: {}
      data:
        value: "{{ now().hour }}"
      target:
        entity_id: input_number.ee_hour_of_day
  mode: single

- alias: EE Set is TOU Workday
  description: Determine todays rates as to workday or holiday
  id: ee_set_is_tou_workday
  mode: single
  triggers:
    - trigger: time
      at: "00:15:00"
      id: Midnight
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - action: calendar.get_events
      metadata: {}
      data:
        duration:
          hours: 36
      target:
        entity_id: calendar.utility_tou_holidays
      response_variable: agenda
    - variables:
        yetz: "{{ now() }}"
        this_day: "{{ (yetz|as_datetime).day }}"
        morgan: "{{ yetz|as_datetime + timedelta(days=1) }}"
        response: "{{ agenda['calendar.utility_tou_holidays'] }}"
        events: "{{ response.events }}"
        theday: "{{ (yetz|as_datetime).strftime('%Y-%m-%d') }}"
        tou_today: "{{ events|length >= 1 and events[0].start <= theday }}"
        tou_tomorrow: |-
          {{ 
            events|length == 2 or 
            (events|length == 1 and events[0].start > theday) 
          }}
    - if:
        - condition: and
          conditions:
            - condition: time
              weekday:
                - mon
                - tue
                - wed
                - thu
                - fri
            - condition: template
              value_template: "{{ not tou_today }}"
      then:
        - action: input_boolean.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_tou_workday
      else:
        - action: input_boolean.turn_off
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_tou_workday
    - if:
        - condition: and
          conditions:
            - condition: time
              weekday:
                - sun
                - mon
                - tue
                - wed
                - thu
            - condition: template
              value_template: "{{ not tou_tomorrow }}"
      then:
        - action: input_boolean.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_tou_workday_tomorrow
      else:
        - action: input_boolean.turn_off
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_tou_workday_tomorrow
    - if:
        - condition: template
          value_template: "{{ 5 < (yetz|as_datetime).month < 10 }}"
      then:
        - action: input_boolean.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_summer_season
      else:
        - action: input_boolean.turn_off
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_summer_season
    - if:
        - condition: template
          value_template: "{{ 5 < (morgan|as_datetime).month < 10 }}"
      then:
        - action: input_boolean.turn_on
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_summer_season_tomorrow
      else:
        - action: input_boolean.turn_off
          metadata: {}
          data: {}
          target:
            entity_id: input_boolean.ee_solar_is_summer_season_tomorrow
    - if:
        - condition: trigger
          id:
            - Midnight
      then:
        - action: input_number.set_value
          metadata: {}
          data:
            value: 0
          target:
            entity_id:
              - input_number.ee_observed_solar_production_max
              - input_number.ee_observed_solar_whrs_predicted_max
        - action: input_number.set_value
          metadata: {}
          data:
            value: 0
          target:
            entity_id: input_number.ee_solar_state_controller_counter

- alias: EE Solar Controller
  id: ee_solar_controller
  description: "Change Envoy Tariff for desired battery usage"
  trigger_variables:
    ZN80_M_8: ZN80/M-8
    ZN80_5p_8: ZN80/5p-8
    ZN96_M_5: ZN96/M-4p
    DL65_5p_8: DL65/5p-8
  triggers:
    - alias: Go ZN Workday
      trigger: template
      id: Go ZN Workday
      value_template: |-
        {{ 
          states('input_boolean.ee_solar_is_tou_workday') == 'on' 
            and
          states('input_number.ee_observed_solar_production') | int(0) >= 925000
            and
          states('input_number.ee_solar_generation_forecast') | int(0) > 
              states('sensor.ee_envoy_battery_charge_needed') | int(0) 
            and
          states('input_number.ee_solar_state_controller_counter') | int(0) == 0 
            and
          states('input_text.ee_solar_envoy_tariff_name') != ZN80_M_8 
            and
          states('input_boolean.ee_utilities_booted') == 'on'
        }}
      for:
        seconds: 4
    - trigger: template
      alias: Stop ZN Workday
      id: Stop ZN Workday
      value_template: |-
        {{
          states('input_boolean.ee_solar_is_tou_workday') == 'on' 
            and
          states('input_number.ee_solar_generation_forecast') | int(0) < 
              states('sensor.ee_envoy_battery_charge_needed') | int(-1)
            and
          8 <= states('input_number.ee_hour_of_day') | int(0) <= 15
            and
          states('input_text.ee_solar_envoy_tariff_name') == ZN80_M_8 
            and
          states('input_number.ee_observed_charge') | int(0) <= 97 
            and
          states('input_boolean.ee_utilities_booted') == 'on'
        }}
      for:
        minutes: 30
    - trigger: template
      alias: Go ZN Weekend/Holiday
      id: Go ZN Weekend
      value_template: |-
        {{ 
          states('input_boolean.ee_solar_is_tou_workday') == 'off' 
            and
          states('input_number.ee_observed_solar_production') | int(0) >= 925000
            and
          states('input_number.ee_solar_generation_forecast') | int(0) > 
              states('sensor.ee_envoy_battery_charge_needed') | int(0) 
            and
          states('input_number.ee_solar_state_controller_counter') | int(0) == 0 
            and
          states('input_text.ee_solar_envoy_tariff_name') != ZN96_M_5 
            and
          states('input_boolean.ee_utilities_booted') == 'on'
        }}
      for:
        seconds: 4
    - trigger: template
      alias: Stop ZN Weekend/Holiday
      id: Stop ZN Weekend
      value_template: |-
        {{
          states('input_boolean.ee_solar_is_tou_workday') == 'off' 
            and
          states('input_number.ee_solar_generation_forecast') | int(0) < 
              states('sensor.ee_envoy_battery_charge_needed') | int(-1)
            and
          8 <= states('input_number.ee_hour_of_day') | int(0) <= 15
            and
          states('input_text.ee_solar_envoy_tariff_name') == ZN96_M_5 
            and
          states('input_number.ee_observed_charge') | int(0) <= 97 
            and
          states('input_boolean.ee_utilities_booted') == 'on'
        }}
      for:
        minutes: 30
    - trigger: time
      alias: Go DL?
      id: Go DL?
      at: "16:45:00"
    - trigger: state
      alias: Booted
      id: Booted
      entity_id:
        - input_boolean.ee_utilities_booted
      to:
        - "on"
  conditions: []
  actions:
    - variables:
        time_now: "{{ now() }}"
        timestamp: "{{ (time_now | as_datetime).timestamp() | int(0) }}"
        summer: "{{ states('input_boolean.ee_solar_is_summer_season') == 'on' }}"
        workday: "{{ states('input_boolean.ee_solar_is_tou_workday') == 'on' }}"
        current_tariff: "{{ states('input_text.ee_solar_envoy_tariff_name') }}"
        doit: false
    - choose:
        - conditions:
            - condition: trigger
              id: Go ZN Workday
          sequence:
            - variables:
                tariff:
                  time: "{{ timestamp }}"
                  name: "{{ ZN80_M_8 }}"
                  peak_rule: ZN
                  peak_start: |-
                    {{ 
                      (time_now | as_datetime).hour * 60 + (time_now | as_datetime).minute
                    }}
                  peak_end: 961
                  second_start: 1021
                  second_end: 1201
                  reserve: 78
                doit: true
            - action: input_number.increment
              metadata: {}
              target:
                entity_id: input_number.ee_solar_state_controller_counter
              data: {}
        - conditions:
            - condition: trigger
              id: Stop ZN Workday
          sequence:
            - variables:
                tariff:
                  time: "{{ timestamp }}"
                  name: "{{ DL65_5p_8 if summer else ZN80_5p_8 }}"
                  peak_rule: "{{ 'DL' if summer else 'ZN' }}"
                  peak_start: 1021
                  peak_end: 1201
                  reserve: "{{ 65 if summer else 78 }}"
                doit: true
        - conditions:
            - condition: trigger
              id: Go ZN Weekend
          sequence:
            - variables:
                tariff:
                  time: "{{ timestamp }}"
                  name: "{{ ZN96_M_5 }}"
                  peak_rule: ZN
                  peak_start: |-
                    {{ 
                      (time_now | as_datetime).hour * 60 + (time_now | as_datetime).minute
                    }}
                  peak_end: 930
                  reserve: 82
                doit: true
            - action: input_number.increment
              metadata: {}
              target:
                entity_id: input_number.ee_solar_state_controller_counter
              data: {}
        - conditions:
            - condition: trigger
              id: Stop ZN Weekend
          sequence:
            - variables:
                tariff:
                  time: "{{ timestamp }}"
                  name: CPCP
                  peak_rule: ZN
                  peak_start: 660
                  peak_end: 665
                  reserve: 96
                doit: true
        - conditions:
            - condition: trigger
              id:
                - Go DL?
                - Booted
          sequence:
            - if:
                - condition: and
                  conditions:
                    - condition: template
                      value_template: "{{ workday }}"
                    - condition: or
                      conditions:
                        - condition: template
                          value_template: "{{ trigger.id == 'Go DL?' }}"
                        - condition: time
                          after: "16:40:00"
                          before: "20:00:00"
              then:
                - if:
                    - condition: template
                      value_template: |-
                        {{ 
                          summer 
                            and
                          current_tariff != DL65_5p_8
                        }}
                  then:
                    - variables:
                        tariff:
                          time: "{{ timestamp }}"
                          name: "{{ DL65_5p_8 }}"
                          peak_rule: DL
                          peak_start: 1021
                          peak_end: 1201
                          reserve: 65
                        doit: true
                - if:
                    - condition: template
                      value_template: |-
                        {{ 
                          not summer
                            and 
                          current_tariff != ZN80_5p_8
                            and
                          current_tariff != ZN80_M_8
                        }}
                  then:
                    - variables:
                        tariff:
                          time: "{{ timestamp }}"
                          name: "{{ ZN80_5p_8 }}"
                          peak_rule: ZN
                          peak_start: 1021
                          peak_end: 1201
                          reserve: 65
                        doit: true
    - if:
        - condition: template
          value_template: "{{ doit }}"
      then:
        - action: input_text.set_value
          metadata: {}
          target:
            entity_id: input_text.ee_solar_envoy_tariff_parameters
          data:
            value: "{{ tariff }}"
        - action: input_text.set_value
          metadata: {}
          target:
            entity_id: input_text.ee_solar_envoy_tariff_name
          data:
            value: "{{ tariff.name }}"
        - action: input_text.set_value
          metadata: {}
          target:
            entity_id: input_text.ee_solar_envoy_tariff_time
          data:
            value: "{{ tariff.time }}"
        - action: notify.persistent_notification
          metadata: {}
          data:
            message: |-
              {{ trigger.id }}
              {{ tariff.name }}
              {{ now().strftime("%y-%m-%d %H:%M:%S") }}
  mode: single
- alias: EE Build Solar Forecast Timetable
  id: ee_build_solar_forecast_timetable
  description: "Constructs timetable for the solar day from Open Mateo and solar irradiance formuala"
  triggers:
    - trigger: sun
      event: sunrise
      offset: "00:45:00"
  conditions: []
  actions:
    - action: script.ee_build_solar_forecsat_timetable
      metadata: {}
      data: {}
    - action: automation.trigger
      metadata: {}
      target:
        entity_id: automation.ee_forecast_solar_generation
      data:
        skip_condition: true
  mode: single

- alias: EE Wake Battery
  id: ee_solar_wake_battery
  description: "Poke Envoy tariff if battery is not discharging when it should be."
  triggers:
    - trigger: template
      value_template: |-
        {{
          states('input_boolean.ee_solar_is_tou_workday') == 'on' 
            and
          17 <= states('input_number.ee_hour_of_day') | int <= 19
            and
          states('input_number.ee_observed_battery_flow') | int == 0
            and
          states('input_number.ee_observed_charge') | int - 2 >=
              states('input_number.ee_observed_tariff_battery_reserve') | int
        }}
      for:
        minutes: 1
  conditions: []
  actions:
    - variables:
        time_now: "{{ now().timestamp() | int }}"
        params: |-
          {{ 
            states('input_text.ee_solar_envoy_tariff_parameters')
            .replace("'", '"') 
            | from_json
          }}
    - action: input_text.set_value
      metadata: {}
      target:
        entity_id: input_text.ee_solar_envoy_tariff_parameters
      data:
        value: "{{ dict(params, time=time_now) }}"
    - action: input_text.set_value
      metadata: {}
      target:
        entity_id: input_text.ee_solar_envoy_tariff_time
      data:
        value: "{{ time_now }}"
    - action: notify.persistent_notification
      metadata: {}
      data:
        message: Waking Battery {{ now().strftime("%y-%m-%d %H:%M:%S") }}
  mode: single
