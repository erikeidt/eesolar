
input_boolean:
  ee_solar_is_tou_workday:
    name: "EE Solar is TOU Workday"
    initial: off
  ee_solar_is_tou_workday_tomorrow:
    name: "EE Solar is TOU Workday Tomorrow"
    initial: off
  ee_solar_is_summer_season:
    name: "EE Solar is Summer Season"
    initial: off
  ee_solar_is_summer_season_tomorrow:
    name: "EE Solar is Summer Season Tomorrow"
    initial: off

input_number:
  ee_observed_battery_flow:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Battery Flow"
    initial: 0
  ee_observed_solar_production:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Solar Production"
    initial: 0
  ee_observed_solar_production_max:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Solar Production Max"
    initial: 0
  ee_observed_net_consumption:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Net Consumption"
    initial: 0
  ee_observed_home_load:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Home Load"
    initial: 0
  ee_observed_total_consumption:
    min: -10000000000.0
    max: 10000000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "mW"
    name: "Total Consumption"
    initial: 0
  ee_observed_charge:
    min: 0.0
    max: 200.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "%"
    name: "Charge %"
    initial: 0
  ee_observed_tariff_battery_reserve:
    min: 0.0
    max: 200.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "%"
    name: "Battery Reserve %"
    initial: 0
  ee_observed_envoy_read_battery_latency:
    min: 0.0
    max: 1000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "ms"
    name: "Battery Latency"
    initial: 0
  ee_observed_envoy_read_livedata_latency:
    min: 0.0
    max: 1000000.0
    mode: "box"
    step: 1.0
    unit_of_measurement: "ms"
    name: "Livedata Latency"
    initial: 0
  ee_hour_of_day:
    min: 0
    max: 24
    mode: "box"
    step: 1.0
    name: "Hour of Day"
    initial: 0
  ee_solar_generation_forecast_just_clouds:
    min: -1000000
    max:  10000000.0
    mode: "box"
    step: 1000
    name: Solar Generation Forecast just Clouds
    unit_of_measurement: "Wh"
    initial: 0
  ee_solar_generation_forecast:
    min: -1000000
    max:  10000000.0
    mode: "box"
    step: 1000
    name: Solar Generation Forecast
    unit_of_measurement: "Wh"
    initial: 0
  ee_solar_state_controller_counter:
    min: 0
    max: 100
    name: Controller State Counter
    
input_text:
  ee_observed_tariff:
    max: 16
    name: "Observed Tariff"
    initial: "??"
  ee_observed_tariff_schedule:
    max: 255
    name: "Observed Tariff Schedule"
    initial: "??"
  ee_observed_batteries:
    max: 255
    name: "Observed Batteries"
    initial: "??"
  ee_observed_vers:
    max: 16 
    name: "Observed Vers"
    initial: "??"
  ee_observed_grid_status:
    max: 16 
    name: "Observed Grid Status"
    initial: "??"
  solar_array_info:
    name: "Solar Array Info"
    max: 255
    initial: '[ { "e": 26, "a": 180, "r": 6660, "c": -0.38, "x": 5310, "b": 20.16, "h": 1100, "y": 2021, "d": -0.3 } ]'
  ee_solar_envoy_tariff_name:
    max: 255
    name: "Tariff Name"
  ee_solar_envoy_tariff_time:
    max: 255
    name: "Tariff Time"
  ee_solar_envoy_tariff_parameters:
    max: 255
    name: "Tariff Params"
  ee_solar_observed_tariff_time:
    max: 255
    name: "Observed Tariff Time"

input_datetime:
  ee_envoy_pc_reporting_time:
    has_time: true
    has_date: false
    name: "PC Reporting Time"
    initial: 00:00
  ee_envoy_battery_reporting_time:
    has_time: true
    has_date: false
    name: "Battery Reporting Time"
    initial: 00:00

